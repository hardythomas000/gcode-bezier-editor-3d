  <div id="sidebar">

      <button class="btn" id="bfit">Fit</button>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// AUDIO ENGINE (carried over from 2D version)
// ============================================================
const Audio = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function grab() {
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 2000; f.Q.value = 8;
    o.type = 'sine';
    o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.08);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(f); f.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.15);
  }
  function drop() {
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(), o2 = c.createOscillator();
    const g = c.createGain(), g2 = c.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(600, t);
    o.frequency.exponentialRampToValueAtTime(120, t + 0.12);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.2);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(80, t);
    o2.frequency.exponentialRampToValueAtTime(40, t + 0.15);
    g2.gain.setValueAtTime(0.2, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o2.connect(g2); g2.connect(c.destination);
    o2.start(t); o2.stop(t + 0.18);
  }
  let lastTick = 0;
  function drag(mx, my) {
    const now = performance.now();
    if (now - lastTick < 40) return;
    lastTick = now;
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 1500;
    o.type = 'square';
    const pitch = 200 + (mx % 50) * 20 + (my % 50) * 10;
    o.frequency.setValueAtTime(pitch, t);
    g.gain.setValueAtTime(0.03, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    o.connect(f); f.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.03);
  }
  function select() {
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(), o2 = c.createOscillator(), g = c.createGain();
    o.type = 'sine'; o.frequency.value = 1200;
    o2.type = 'sine'; o2.frequency.value = 1800;
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    o.connect(g); o2.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.08);
    o2.start(t + 0.02); o2.stop(t + 0.08);
  }
  let lastHover = 0;
  function hover() {
    const now = performance.now();
    if (now - lastHover < 100) return;
    lastHover = now;
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine'; o.frequency.value = 2400;
    g.gain.setValueAtTime(0.02, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.025);
  }
  function snap() {
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'triangle'; o.frequency.value = 3000;
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.02);
  }
  // Tracer synth
  let trOsc = null, trOsc2 = null, trGain = null, trFilter = null, trStarted = false;
  const notes = [130.8,146.8,164.8,196.0,220.0,261.6,293.7,329.6,392.0,440.0,523.3,587.3,659.3,784.0,880.0];
  function tracerUpdate(x, y, z, moveType, bounds) {
    const c = ac();
    if (!trStarted) {
      trOsc = c.createOscillator(); trOsc2 = c.createOscillator();
      trFilter = c.createBiquadFilter(); trGain = c.createGain();
      const comp = c.createDynamicsCompressor();
      trFilter.type = 'lowpass'; trFilter.Q.value = 6;
      trOsc.type = 'sine'; trOsc2.type = 'triangle';
      const g2 = c.createGain(); g2.gain.value = 0.3;
      trOsc.connect(trFilter); trOsc2.connect(g2); g2.connect(trFilter);
      trFilter.connect(trGain); trGain.connect(comp); comp.connect(c.destination);
      trGain.gain.value = 0; trOsc.start(); trOsc2.start(); trStarted = true;
    }
    const t = c.currentTime;
    const bw = (bounds.maxX - bounds.minX) || 1;
    const bh = (bounds.maxY - bounds.minY) || 1;
    const bd = (bounds.maxZ - bounds.minZ) || 1;
    const nx = Math.max(0, Math.min(1, (x - bounds.minX) / bw));
    const ny = Math.max(0, Math.min(1, (y - bounds.minY) / bh));
    const nz = Math.max(0, Math.min(1, (z - bounds.minZ) / bd));
    const noteIdx = Math.floor(nx * (notes.length - 1));
    const freq = notes[noteIdx];
    trOsc.frequency.setTargetAtTime(freq, t, 0.05);
    trOsc2.frequency.setTargetAtTime(freq * 0.5, t, 0.05);
    const cutoff = 200 + ny * 2000 + nz * 1000;
    trFilter.frequency.setTargetAtTime(cutoff, t, 0.03);
    if (moveType === 0) { trGain.gain.setTargetAtTime(0.01, t, 0.02); trOsc.type = 'sine'; }
    else if (moveType === 2 || moveType === 3) { trGain.gain.setTargetAtTime(0.045, t, 0.02); trOsc.type = 'sine'; trOsc2.frequency.setTargetAtTime(freq * 0.501, t, 0.05); }
    else { trGain.gain.setTargetAtTime(0.035, t, 0.02); trOsc.type = 'sine'; }
  }
  function tracerStop() {
    if (trGain && trStarted) trGain.gain.setTargetAtTime(0, ac().currentTime, 0.05);
  }
  return { grab, drop, drag, select, hover, snap, tracerUpdate, tracerStop };
})();

// ============================================================
// STATE
// ============================================================
const S = {
  lines: [],
  segs: [],
  pts: [],
  hover: { ptIdx: -1, lineIdx: -1 },
  selLine: -1,
  snap: false,
  sound: true,
  showEdit: false,
  animT: 0,
  totalLen: 0,
  bounds: { minX: 0, minY: 0, maxX: 1, maxY: 1, minZ: 0, maxZ: 0 },
  dragAxis: 'free', // free, x, y, z, xy, xz
};

const codePanel = document.getElementById('code-panel');
const coordsEl = document.getElementById('coords');
const statusSegs = document.getElementById('ssegs');
const statusLen = document.getElementById('slen');

const COLORS = {
  G0: 0xffd866,
  G1: 0x00e5ff,
  G2: 0x69ff94,
  G3: 0xff6ac1,
};
const COLOR_HEX = { G0: '#ffd866', G1: '#00e5ff', G2: '#69ff94', G3: '#ff6ac1' };

// ============================================================
// SAMPLE GCODE (3D with Z moves)
// ============================================================
const SAMPLE = `(SAMPLE BRACKET - 3D)
G90 G17 G21
(APPROACH)
G0 X0 Y0 Z10.0
G0 X5.0 Y0 Z5.0
(OUTER CONTOUR - LAYER 1)
G1 X35.0 Y0 Z0 F800
G3 X40.0 Y5.0 Z0 I0 J5.0
G1 X40.0 Y25.0 Z0
G3 X35.0 Y30.0 Z0 I-5.0 J0
G1 X25.0 Y30.0 Z0
G1 X20.0 Y40.0 Z-2.0
G1 X15.0 Y30.0 Z0
G1 X5.0 Y30.0 Z0
G3 X0 Y25.0 Z0 I0 J-5.0
G1 X0 Y5.0 Z0
G3 X5.0 Y0 Z0 I5.0 J0
(CENTER HOLE - HELICAL)
G0 X25.0 Y15.0 Z2.0
G1 X25.0 Y15.0 Z0 F400
G3 X15.0 Y15.0 Z-1.0 I-5.0 J0
G3 X25.0 Y15.0 Z-2.0 I5.0 J0
G3 X15.0 Y15.0 Z-3.0 I-5.0 J0
G3 X25.0 Y15.0 Z-4.0 I5.0 J0
(RETRACT)
G0 X25.0 Y15.0 Z10.0
M30`;

// ============================================================
// GCODE PARSER (3D - full XYZ + helical arcs)
// ============================================================
function parseWord(line, letter) {
  const re = new RegExp(`${letter}([+-]?\\d*\\.?\\d+)`, 'i');
  const m = line.match(re);
  return m ? parseFloat(m[1]) : null;
}

function stripComments(line) {
  return line.replace(/\([^)]*\)/g, '').replace(/;.*$/, '').trim();
}

function parseGcode(lines) {
  const segs = [];
  let mode = null, cx = 0, cy = 0, cz = 0, feed = 0;

  for (let i = 0; i < lines.length; i++) {
    const raw = stripComments(lines[i]);
    if (!raw) continue;

    const gCodes = raw.match(/G\d+(\.\d+)?/gi) || [];
    for (const gc of gCodes) {
      const n = parseFloat(gc.slice(1));
      if (n === 0 || n === 1 || n === 2 || n === 3) mode = n;
    }

    if (mode === null) continue;

    const x = parseWord(raw, 'X');
    const y = parseWord(raw, 'Y');
    const z = parseWord(raw, 'Z');
    const ii = parseWord(raw, 'I');
    const jj = parseWord(raw, 'J');
    const f = parseWord(raw, 'F');

    if (x === null && y === null && z === null) continue;

    const nx = x !== null ? x : cx;
    const ny = y !== null ? y : cy;
    const nz = z !== null ? z : cz;
    if (f !== null) feed = f;

    const seg = {
      type: mode, lineIdx: i,
      sx: cx, sy: cy, sz: cz,
      ex: nx, ey: ny, ez: nz,
      cx: null, cy: null, feed,
    };

    if ((mode === 2 || mode === 3) && (ii !== null || jj !== null)) {
      seg.cx = cx + (ii || 0);
      seg.cy = cy + (jj || 0);
    }

    segs.push(seg);
    cx = nx; cy = ny; cz = nz;
  }
  return segs;
}

// ============================================================
// GEOMETRY HELPERS (3D)
// ============================================================
function dist3(x1, y1, z1, x2, y2, z2) { return Math.hypot(x2 - x1, y2 - y1, z2 - z1); }
function dist2(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

function arcPoints3D(seg, n = 64) {
  const r1 = dist2(seg.sx, seg.sy, seg.cx, seg.cy);
  const r2 = dist2(seg.ex, seg.ey, seg.cx, seg.cy);
  let a1 = Math.atan2(seg.sy - seg.cy, seg.sx - seg.cx);
  let a2 = Math.atan2(seg.ey - seg.cy, seg.ex - seg.cx);
  const cw = seg.type === 2;

  if (cw) { while (a2 >= a1) a2 -= Math.PI * 2; }
  else    { while (a2 <= a1) a2 += Math.PI * 2; }

  // Full circle detection
  if (Math.abs(seg.ex - seg.sx) < 0.001 && Math.abs(seg.ey - seg.sy) < 0.001) {
    if (Math.abs(seg.ez - seg.sz) > 0.001 || (Math.abs(a2 - a1) < 0.01)) {
      a2 = a1 + (cw ? -Math.PI * 2 : Math.PI * 2);
    }
  }

  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const a = a1 + t * (a2 - a1);
    const r = r1 + t * (r2 - r1);
    const z = seg.sz + t * (seg.ez - seg.sz); // helical Z interpolation
    pts.push({ x: seg.cx + r * Math.cos(a), y: seg.cy + r * Math.sin(a), z });
  }
  return pts;
}

function segLength(seg) {
  if (seg.type <= 1) return dist3(seg.sx, seg.sy, seg.sz, seg.ex, seg.ey, seg.ez);
  const pts = arcPoints3D(seg, 32);
  let len = 0;
  for (let i = 1; i < pts.length; i++) len += dist3(pts[i-1].x, pts[i-1].y, pts[i-1].z, pts[i].x, pts[i].y, pts[i].z);
  return len;
}

function pointOnSeg3D(seg, t) {
  if (seg.type <= 1) {
    return {
      x: seg.sx + t * (seg.ex - seg.sx),
      y: seg.sy + t * (seg.ey - seg.sy),
      z: seg.sz + t * (seg.ez - seg.sz),
    };
  }
  const pts = arcPoints3D(seg, 64);
  const idx = Math.min(Math.floor(t * (pts.length - 1)), pts.length - 2);
  const lt = t * (pts.length - 1) - idx;
  return {
    x: pts[idx].x + lt * (pts[idx+1].x - pts[idx].x),
    y: pts[idx].y + lt * (pts[idx+1].y - pts[idx].y),
    z: pts[idx].z + lt * (pts[idx+1].z - pts[idx].z),
  };
}

// ============================================================
// CONTROL POINTS
// ============================================================
function buildPoints(segs) {
  const pts = [];
  for (let i = 0; i < segs.length; i++) {
    const s = segs[i];
    pts.push({ x: s.ex, y: s.ey, z: s.ez, segIdx: i, role: 'end', lineIdx: s.lineIdx });
    if (s.cx !== null) {
      // Arc center at the Z midpoint
      const midZ = (s.sz + s.ez) / 2;
      pts.push({ x: s.cx, y: s.cy, z: midZ, segIdx: i, role: 'center', lineIdx: s.lineIdx });
    }
  }
  return pts;
}

// ============================================================
// THREE.JS SETUP
// ============================================================
const container = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0e17);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 10000);
camera.position.set(60, -40, 50);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.target.set(20, 15, 0);
controls.update();

// Groups
const toolpathGroup = new THREE.Group();
const pointsGroup = new THREE.Group();
const gridGroup = new THREE.Group();
const originGroup = new THREE.Group();
const dotGroup = new THREE.Group();
scene.add(toolpathGroup, pointsGroup, gridGroup, originGroup, dotGroup);

// Lighting (subtle, for point spheres)
scene.add(new THREE.AmbientLight(0x404060, 0.8));
const dl = new THREE.DirectionalLight(0xffffff, 0.6);
dl.position.set(50, 50, 100);
scene.add(dl);

// ============================================================
// BUILD 3D SCENE
// ============================================================
function buildGrid() {
  gridGroup.clear();
  const size = 120;
  const divisions = 12;
  const grid = new THREE.GridHelper(size, divisions, 0x222244, 0x161630);
  grid.rotation.x = Math.PI / 2; // XY plane
  grid.position.set(size/2 - 10, size/2 - 10, 0);
  gridGroup.add(grid);
}

function buildOrigin() {
  originGroup.clear();
  const len = 15;
  // X red
  const xg = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(len,0,0)]);
  originGroup.add(new THREE.Line(xg, new THREE.LineBasicMaterial({ color: 0xff4444 })));
  // Y green
  const yg = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,len,0)]);
  originGroup.add(new THREE.Line(yg, new THREE.LineBasicMaterial({ color: 0x44ff44 })));
  // Z blue
  const zg = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,len)]);
  originGroup.add(new THREE.Line(zg, new THREE.LineBasicMaterial({ color: 0x4488ff })));
}

function buildToolpath() {
  toolpathGroup.clear();

  // Group segments by type
  const verts = { 0: [], 1: [], 2: [], 3: [] };

  for (const seg of S.segs) {
    if (seg.type <= 1) {
      verts[seg.type].push(seg.sx, seg.sy, seg.sz, seg.ex, seg.ey, seg.ez);
    } else {
      const pts = arcPoints3D(seg);
      for (let i = 0; i < pts.length - 1; i++) {
        verts[seg.type].push(pts[i].x, pts[i].y, pts[i].z, pts[i+1].x, pts[i+1].y, pts[i+1].z);
      }
    }
  }

  // Rapid - dashed
  if (verts[0].length > 0) {
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(verts[0], 3));
    const mat = new THREE.LineDashedMaterial({ color: COLORS.G0, dashSize: 2, gapSize: 1.5, opacity: 0.5, transparent: true });
    const line = new THREE.LineSegments(geom, mat);
    line.computeLineDistances();
    line.userData.moveType = 0;
    toolpathGroup.add(line);
  }

  // Feed, CW, CCW
  for (const t of [1, 2, 3]) {
    if (verts[t].length === 0) continue;
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(verts[t], 3));
    const mat = new THREE.LineBasicMaterial({ color: COLORS[`G${t}`] });
    const line = new THREE.LineSegments(geom, mat);
    line.userData.moveType = t;
    toolpathGroup.add(line);
  }
}

function buildPointSpheres() {
  pointsGroup.clear();

  const endGeom = new THREE.SphereGeometry(0.6, 10, 10);
  const centerGeom = new THREE.OctahedronGeometry(0.5);

  for (let i = 0; i < S.pts.length; i++) {
    const pt = S.pts[i];
    const isCenter = pt.role === 'center';
    const seg = S.segs[pt.segIdx];
    const color = COLORS[`G${seg.type}`] || 0x00e5ff;

    const mat = new THREE.MeshPhongMaterial({
      color: isCenter ? 0xffa657 : color,
      emissive: isCenter ? 0x664422 : new THREE.Color(color).multiplyScalar(0.3),
      transparent: true,
      opacity: 0.8,
    });
    const mesh = new THREE.Mesh(isCenter ? centerGeom : endGeom, mat);
    mesh.position.set(pt.x, pt.y, pt.z);
    mesh.userData.ptIdx = i;
    mesh.userData.isCenter = isCenter;
    pointsGroup.add(mesh);

    // Dashed line from center to arc start
    if (isCenter) {
      const lg = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(pt.x, pt.y, pt.z),
        new THREE.Vector3(seg.sx, seg.sy, seg.sz)
      ]);
      const lm = new THREE.LineDashedMaterial({ color: 0xffa657, opacity: 0.3, transparent: true, dashSize: 1, gapSize: 1 });
      const ll = new THREE.Line(lg, lm);
      ll.computeLineDistances();
      pointsGroup.add(ll);
    }
  }
}

// Traveling dot
const dotGeom = new THREE.SphereGeometry(0.4, 12, 12);
const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const dot = new THREE.Mesh(dotGeom, dotMat);
dotGroup.add(dot);

function updateDot() {
  if (S.segs.length === 0 || S.totalLen === 0) { dot.visible = false; return; }
  dot.visible = true;
  let target = S.animT * S.totalLen;
  for (const seg of S.segs) {
    const len = segLength(seg);
    if (target <= len || seg === S.segs[S.segs.length - 1]) {
      const t = len > 0 ? Math.min(target / len, 1) : 0;
      const pt = pointOnSeg3D(seg, t);
      dot.position.set(pt.x, pt.y, pt.z);
      if (S.sound) Audio.tracerUpdate(pt.x, pt.y, pt.z, seg.type, S.bounds);
      else Audio.tracerStop();
      return;
    }
    target -= len;
  }
}

// ============================================================
// RAYCASTING & DRAG
// ============================================================
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 2 };
const mouse = new THREE.Vector2();
let dragPt = null; // { ptIdx, plane, offset }
let hoverPtIdx = -1;

function getMouseNDC(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  return new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
}

function getDragPlane(point3D) {
  const axis = S.dragAxis;
  if (axis === 'xy') return new THREE.Plane(new THREE.Vector3(0, 0, 1), -point3D.z);
  if (axis === 'xz') return new THREE.Plane(new THREE.Vector3(0, 1, 0), -point3D.y);
  // For free/single axis, use camera-facing plane through point
  const normal = camera.getWorldDirection(new THREE.Vector3()).negate();
  const plane = new THREE.Plane();
  plane.setFromNormalAndCoplanarPoint(normal, point3D);
  return plane;
}

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  mouse.copy(getMouseNDC(e));
  raycaster.setFromCamera(mouse, camera);

  const meshes = pointsGroup.children.filter(c => c instanceof THREE.Mesh);
  const hits = raycaster.intersectObjects(meshes);

  if (hits.length > 0) {
    const mesh = hits[0].object;
    const ptIdx = mesh.userData.ptIdx;
    const pt = S.pts[ptIdx];
    const point3D = new THREE.Vector3(pt.x, pt.y, pt.z);
    const plane = getDragPlane(point3D);
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersection);
    const offset = point3D.clone().sub(intersection);

    dragPt = { ptIdx, plane, offset };
    controls.enabled = false;
    if (S.sound) Audio.grab();
    e.stopPropagation();
  }
});

renderer.domElement.addEventListener('pointermove', e => {
  mouse.copy(getMouseNDC(e));

  if (dragPt) {
    raycaster.setFromCamera(mouse, camera);
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPt.plane, intersection);
    if (!intersection) return;
    intersection.add(dragPt.offset);

    const pt = S.pts[dragPt.ptIdx];
    const axis = S.dragAxis;

    let mx = intersection.x, my = intersection.y, mz = intersection.z;

    // Axis constraints
    if (axis === 'x') { my = pt.y; mz = pt.z; }
    else if (axis === 'y') { mx = pt.x; mz = pt.z; }
    else if (axis === 'z') { mx = pt.x; my = pt.y; }
    else if (axis === 'xy') { mz = pt.z; }
    else if (axis === 'xz') { my = pt.y; }

    if (S.snap) {
      const g = 1;
      mx = Math.round(mx / g) * g;
      my = Math.round(my / g) * g;
      mz = Math.round(mz / g) * g;
    }

    applyDrag3D(dragPt.ptIdx, mx, my, mz);
    if (S.sound) Audio.drag(mx, my);
    coordsEl.textContent = `X: ${mx.toFixed(3)}  Y: ${my.toFixed(3)}  Z: ${mz.toFixed(3)}`;
    return;
  }

  // Hover detection
  raycaster.setFromCamera(mouse, camera);
  const meshes = pointsGroup.children.filter(c => c instanceof THREE.Mesh);
  const hits = raycaster.intersectObjects(meshes);

  const newHover = hits.length > 0 ? hits[0].object.userData.ptIdx : -1;
  if (newHover !== hoverPtIdx) {
    // Reset previous
    if (hoverPtIdx >= 0) {
      const prev = meshes.find(m => m.userData.ptIdx === hoverPtIdx);
      if (prev) { prev.scale.set(1, 1, 1); }
    }
    hoverPtIdx = newHover;
    if (hoverPtIdx >= 0) {
      const curr = meshes.find(m => m.userData.ptIdx === hoverPtIdx);
      if (curr) { curr.scale.set(1.8, 1.8, 1.8); }
      if (S.sound) Audio.hover();
      S.hover.lineIdx = S.pts[hoverPtIdx].lineIdx;
      renderer.domElement.style.cursor = 'grab';
    } else {
      S.hover.lineIdx = -1;
      renderer.domElement.style.cursor = 'default';
    }
    renderCode();
  }
});

renderer.domElement.addEventListener('pointerup', () => {
  if (dragPt) {
    if (S.sound) Audio.drop();
    dragPt = null;
    controls.enabled = true;
  }
});

// ============================================================
// G-CODE UPDATER (3D)
// ============================================================
function fmtNum(n) {
  let s = n.toFixed(4).replace(/0+$/, '');
  if (s.endsWith('.')) s += '0';
  if (s === '-0.0') s = '0.0';
  return s;
}

function updateWord(line, word, val) {
  const re = new RegExp(`(${word})[+-]?(?:\\d+\\.?\\d*|\\.\\d+)`, 'i');
  const v = fmtNum(val);
  if (re.test(line)) return line.replace(re, `$1${v}`);
  return line + ` ${word}${v}`;
}

function applyDrag3D(ptIdx, mx, my, mz) {
  const pt = S.pts[ptIdx];
  const seg = S.segs[pt.segIdx];
  let line = S.lines[pt.lineIdx];

  if (pt.role === 'end') {
    line = updateWord(line, 'X', mx);
    line = updateWord(line, 'Y', my);
    line = updateWord(line, 'Z', mz);
    if (seg.cx !== null) {
      line = updateWord(line, 'I', seg.cx - seg.sx);
      line = updateWord(line, 'J', seg.cy - seg.sy);
    }
  } else if (pt.role === 'center') {
    const newI = mx - seg.sx;
    const newJ = my - seg.sy;
    line = updateWord(line, 'I', newI);
    line = updateWord(line, 'J', newJ);
  }

  S.lines[pt.lineIdx] = line;
  rebuild();
}

// ============================================================
// CODE PANEL
// ============================================================
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hlLine(line) {
  let r = '', i = 0;
  while (i < line.length) {
    if (line[i] === '(' || line[i] === ';') {
      if (line[i] === '(') {
        const e = line.indexOf(')', i);
        const c = e >= 0 ? line.slice(i, e + 1) : line.slice(i);
        r += `<span class="tc">${escHtml(c)}</span>`;
        i = e >= 0 ? e + 1 : line.length;
      } else {
        r += `<span class="tc">${escHtml(line.slice(i))}</span>`;
        i = line.length;
      }
    } else if (/[GM]/i.test(line[i])) {
      const m = line.slice(i).match(/^([GM]\d+(\.\d+)?)/i);
      if (m) {
        const cls = line[i].toUpperCase() === 'G' ? 'tg' : 'tm';
        r += `<span class="${cls}">${escHtml(m[1])}</span>`;
        i += m[1].length;
      } else { r += escHtml(line[i]); i++; }
    } else if (/[Z]/i.test(line[i])) {
      const m = line.slice(i).match(/^([Z][+-]?\d*\.?\d+)/i);
      if (m) { r += `<span class="tz">${escHtml(m[1])}</span>`; i += m[1].length; }
      else { r += escHtml(line[i]); i++; }
    } else if (/[XY]/i.test(line[i])) {
      const m = line.slice(i).match(/^([XY][+-]?\d*\.?\d+)/i);
      if (m) { r += `<span class="txy">${escHtml(m[1])}</span>`; i += m[1].length; }
      else { r += escHtml(line[i]); i++; }
    } else if (/[IJK]/i.test(line[i])) {
      const m = line.slice(i).match(/^([IJK][+-]?\d*\.?\d+)/i);
      if (m) { r += `<span class="tij">${escHtml(m[1])}</span>`; i += m[1].length; }
      else { r += escHtml(line[i]); i++; }
    } else if (/[FS]/i.test(line[i])) {
      const m = line.slice(i).match(/^([FS][+-]?\d*\.?\d+)/i);
      if (m) { r += `<span class="tf">${escHtml(m[1])}</span>`; i += m[1].length; }
      else { r += escHtml(line[i]); i++; }
    } else { r += escHtml(line[i]); i++; }
  }
  return r || '&nbsp;';
}

function renderCode() {
  let html = '';
  for (let i = 0; i < S.lines.length; i++) {
    let cls = '';
    if (S.selLine === i) cls = ' sel';
    else if (S.hover.lineIdx === i) cls = ' hi';
    html += `<div class="cl${cls}" data-n="${i + 1}" data-i="${i}">${hlLine(S.lines[i])}</div>`;
  }
  codePanel.innerHTML = html;

  codePanel.querySelectorAll('.cl').forEach(el => {
    const li = parseInt(el.dataset.i);
    el.addEventListener('mouseenter', () => { S.hover.lineIdx = li; renderCode(); });
    el.addEventListener('mouseleave', () => { S.hover.lineIdx = -1; renderCode(); });
    el.addEventListener('click', () => {
      S.selLine = S.selLine === li ? -1 : li;
      if (S.sound) Audio.select();
      renderCode();
    });
  });
}

// ============================================================
// REBUILD
// ============================================================
function rebuild() {
  S.segs = parseGcode(S.lines);
  S.pts = buildPoints(S.segs);
  S.totalLen = S.segs.reduce((a, s) => a + segLength(s), 0);

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const s of S.segs) {
    minX = Math.min(minX, s.sx, s.ex); maxX = Math.max(maxX, s.sx, s.ex);
    minY = Math.min(minY, s.sy, s.ey); maxY = Math.max(maxY, s.sy, s.ey);
    minZ = Math.min(minZ, s.sz, s.ez); maxZ = Math.max(maxZ, s.sz, s.ez);
  }
  S.bounds = { minX, minY, maxX, maxY, minZ, maxZ };

  statusSegs.textContent = `${S.segs.length} segments`;
  statusLen.textContent = `${S.totalLen.toFixed(1)}mm`;

  buildToolpath();
  buildPointSpheres();
  renderCode();
}

// ============================================================
// FIT VIEW
// ============================================================
function fitView() {
  if (S.segs.length === 0) return;
  const b = S.bounds;
  const cx = (b.minX + b.maxX) / 2;
  const cy = (b.minY + b.maxY) / 2;
  const cz = (b.minZ + b.maxZ) / 2;
  const maxRange = Math.max(b.maxX - b.minX, b.maxY - b.minY, (b.maxZ - b.minZ) || 10);
  const dist = maxRange / (2 * Math.tan(Math.PI * camera.fov / 360)) * 1.6;

  controls.target.set(cx, cy, cz);
  camera.position.set(cx + dist * 0.6, cy - dist * 0.5, cz + dist * 0.7);
  controls.update();
}

// ============================================================
// BUTTONS
// ============================================================
document.getElementById('bfit').addEventListener('click', fitView);
document.getElementById('bsnap').addEventListener('click', function() {
  S.snap = !S.snap;
  this.classList.toggle('active', S.snap);
  if (S.sound) Audio.snap();
});
document.getElementById('bsound').addEventListener('click', function() {
  S.sound = !S.sound;
  this.classList.toggle('active', S.sound);
  if (!S.sound) Audio.tracerStop();
});
document.getElementById('bedit').addEventListener('click', function() {
  S.showEdit = !S.showEdit;
  this.classList.toggle('active', S.showEdit);
  const la = document.getElementById('load-area');
  la.style.display = S.showEdit ? 'block' : 'none';
  if (S.showEdit) document.getElementById('ginput').value = S.lines.join('\n');
});
document.getElementById('bload').addEventListener('click', () => {
  const txt = document.getElementById('ginput').value;
  S.lines = txt.split('\n');
  rebuild();
  fitView();
});

// Drag axis buttons
document.querySelectorAll('#dragMode .dbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    S.dragAxis = btn.dataset.axis;
    document.querySelectorAll('#dragMode .dbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ============================================================
// RESIZE
// ============================================================
function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w === 0 || h === 0) return;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ============================================================
// ANIMATION LOOP
// ============================================================
let lastTime = 0;
function animate(t) {
  requestAnimationFrame(animate);
  const dt = lastTime ? (t - lastTime) / 1000 : 0;
  lastTime = t;

  if (S.totalLen > 0) {
    const speed = 30;
    S.animT += (speed * dt) / S.totalLen;
    if (S.animT > 1) S.animT -= 1;
  }

  updateDot();
  controls.update();
  renderer.render(scene, camera);
}

// ============================================================
// INIT
// ============================================================
resize();
buildGrid();
buildOrigin();
S.lines = SAMPLE.split('\n');
rebuild();
fitView();
requestAnimationFrame(animate);
</script>
